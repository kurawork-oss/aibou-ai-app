name: Backend Keep-Alive

# Render無料プランは無操作でスリープし、次のアクセスに数十秒かかる。
# 10分ごとに /health を叩いて温めておく（BACKEND_URL シークレット未設定ならskip）。
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend /health
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL secret not set — skipping."
            exit 0
          fi
          curl -fsS --max-time 60 "${BACKEND_URL%/}/health" && echo " → ok"
